name: Cleanup Merged Branches

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight UTC
  workflow_dispatch:

jobs:
  cleanup:
    name: Delete merged branches older than 1 day
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Delete merged branches
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const pullRequests = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              per_page: 100,
            });

            const mergedPrByBranch = new Map(
              pullRequests
                .filter(pr => pr.merged_at !== null)
                .map(pr => [pr.head.ref, pr])
            );

            const oneDayAgo = new Date(Date.now() - 24 * 60 * 60 * 1000);
            const protectedBranches = new Set(['main', 'master', 'develop', 'dev']);

            for (const branch of branches) {
              const branchName = branch.name;

              if (protectedBranches.has(branchName)) {
                continue;
              }

              const mergedPr = mergedPrByBranch.get(branchName);
              if (!mergedPr || new Date(mergedPr.merged_at) > oneDayAgo) {
                continue;
              }

              console.log(`Deleting branch: ${branchName} (merged at ${mergedPr.merged_at})`);
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branchName}`,
              });
            }
